<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Login · DoktorJudi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="login-container">
        <!-- ===== Logo ===== -->
        <div class="login-logo">
            <h1><i class="fas fa-shield-alt"></i> DOKTORJUDI</h1>
            <p data-i18n="admin.login.subtitle">Admin Management System</p>
            <div class="lang-switcher" style="justify-content:center; margin-top:10px;">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="zh">中文</button>
            </div>
        </div>

        <!-- ===== Login Form ===== -->
        <div class="login-box">
            <div style="text-align: center; margin-bottom: 20px;">
                <span class="admin-badge" style="font-size:0.8rem; padding:6px 20px;">
                    <i class="fas fa-lock"></i> <span data-i18n="admin.login.secure">Secure Login</span>
                </span>
            </div>

            <div class="input-group" style="background: #0b0e1a; border: 1px solid #2f3868; border-radius:40px; padding:0 16px; display:flex; align-items:center;">
                <i class="fas fa-user" style="color:#f5b342;"></i>
                <input type="text" id="admin-username" data-i18n-placeholder="label.username" placeholder="Username" value="admin" style="background:transparent; border:none; padding:14px 8px; color:white; width:100%; outline:none;">
            </div>

            <div class="input-group" style="background: #0b0e1a; border: 1px solid #2f3868; border-radius:40px; padding:0 16px; display:flex; align-items:center;">
                <i class="fas fa-key" style="color:#f5b342;"></i>
                <input type="password" id="admin-password" data-i18n-placeholder="label.password" placeholder="Password" value="admin123" style="background:transparent; border:none; padding:14px 8px; color:white; width:100%; outline:none;">
            </div>

            <button class="btn btn-primary w-full" id="admin-login-btn" style="justify-content:center; padding:14px; font-size:1rem;">
                <i class="fas fa-sign-in-alt"></i> <span data-i18n="btn.login">Login</span>
            </button>

            <div class="text-muted text-center" style="font-size:0.7rem; margin-top:12px;">
                <i class="fas fa-info-circle"></i> <span data-i18n="admin.login.demo">Demo Account: admin / admin123</span>
            </div>

            <a href="../index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> <span data-i18n="admin.login.back">Back to Home</span>
            </a>
        </div>
    </div>

    <script src="../js/main.js"></script>
</body>
</html>
