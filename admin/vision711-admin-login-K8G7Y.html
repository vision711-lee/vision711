<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Login · VISION711</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f2a 0%, #0f0a2a 100%);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('https://jkbpbjhrgbnzexvjvxgt.supabase.co/storage/v1/object/public/hero-background/desktop-hero-background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px;
        }
        .login-container {
            background: rgba(20, 30, 55, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 40px;
            width: 420px;
            max-width: 100%;
            border: 1px solid rgba(140, 163, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(74,124,255,0.05) 0%, transparent 60%);
            pointer-events: none;
        }
        .login-container > * { position: relative; z-index: 1; }

        .logo {
            text-align: center;
            margin-bottom: 8px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
        }
        .logo h1 span {
            background: linear-gradient(135deg, #00b4ff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo .subtitle {
            font-size: 12px;
            color: #5a6388;
            display: block;
            margin-top: 4px;
            font-weight: 400;
            -webkit-text-fill-color: #5a6388;
            letter-spacing: 2px;
        }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #8a9abb;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .form-group label i { margin-right: 8px; color: #4a7cff; width: 16px; }
        .form-group input {
            width: 100%;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid #2a3560;
            border-radius: 14px;
            padding: 14px 16px;
            color: white;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }
        .form-group input:focus {
            border-color: #4a7cff;
            box-shadow: 0 0 20px rgba(74,124,255,0.08);
        }
        .form-group input::placeholder { color: #4a5a7a; }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #4a7cff, #2f3e7a);
            border: none;
            padding: 16px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(74,124,255,0.3);
        }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .message-box {
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
            min-height: 24px;
        }
        .message-box.error { color: #ff6b6b; }
        .message-box.success { color: #4ade80; }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0 14px;
            color: #3a4a6a;
            font-size: 10px;
            letter-spacing: 1px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .divider::before { margin-right: 16px; }
        .divider::after { margin-left: 16px; }

        .back-link {
            text-align: center;
            margin-top: 14px;
        }
        .back-link a {
            color: #5a6388;
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
        }
        .back-link a:hover { color: #8ca3ff; }
        .back-link a i { margin-right: 6px; }

        .ga-hint {
            font-size: 11px;
            color: #4a5a7a;
            text-align: center;
            margin-top: 4px;
        }
        .ga-hint i { margin-right: 4px; color: #4a7cff; }

        /* Modal 样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-card {
            background: rgba(20, 30, 55, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px 36px;
            width: 440px;
            max-width: 95%;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-card h3 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        .modal-card h3 i { color: #4a7cff; margin-right: 10px; }
        .modal-card .sub {
            font-size: 13px;
            color: #5a6388;
            margin-bottom: 20px;
        }
        .modal-card .form-group {
            margin-bottom: 14px;
        }
        .modal-card .form-group label {
            display: block;
            font-size: 12px;
            color: #5a6388;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .modal-card .form-group input,
        .modal-card .form-group select {
            width: 100%;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid #2a3560;
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }
        .modal-card .form-group input:focus,
        .modal-card .form-group select:focus {
            border-color: #4a7cff;
            box-shadow: 0 0 20px rgba(74,124,255,0.05);
        }
        .modal-card .form-group select option { background: #0a0f2a; }
        .modal-card .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-card .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal-card .modal-actions .btn-save {
            background: linear-gradient(135deg, #4a7cff, #2f3e7a);
            color: #fff;
        }
        .modal-card .modal-actions .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(74,124,255,0.3);
        }
        .modal-card .modal-actions .btn-cancel {
            background: rgba(255,255,255,0.04);
            color: #5a6388;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .modal-card .modal-actions .btn-cancel:hover {
            background: rgba(255,255,255,0.08);
            color: #8a9abb;
        }

        @media (max-width: 480px) {
            .login-container { padding: 32px 24px; }
            .logo h1 { font-size: 24px; }
            .form-group input { padding: 12px 14px; font-size: 13px; }
            .login-btn { padding: 14px; font-size: 14px; }
            .modal-card { padding: 24px 20px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo -->
        <div class="logo">
            <h1><i class="fas fa-shield-alt" style="color:#4a7cff; -webkit-text-fill-color:#4a7cff; margin-right:6px;"></i> VISION<span>711</span></h1>
            <span class="subtitle">ADMIN MANAGEMENT SYSTEM</span>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" autocomplete="off" style="margin-top:24px;">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Admin Username</label>
                <input type="text" id="adminUsername" placeholder="Enter admin username" value="admin">
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="adminPassword" placeholder="Enter password" value="admin123" autocomplete="current-password">
            </div>

            <div class="form-group">
                <label><i class="fas fa-shield-alt"></i> Google Authenticator Code</label>
                <input type="text" id="gaCode" placeholder="6-digit code" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
                <div class="ga-hint">
                    <i class="fas fa-mobile-alt"></i> Open Google Authenticator / Authy app
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>

            <div id="messageBox" class="message-box"></div>
        </form>

        <div class="divider">SECURE ACCESS</div>

        <div class="back-link">
            <a href="/"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script>
        // ============================================================
        // 登录验证
        // ============================================================
        (function() {
            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('adminUsername');
            const passwordInput = document.getElementById('adminPassword');
            const gaInput = document.getElementById('gaCode');
            const messageBox = document.getElementById('messageBox');
            const loginBtn = document.getElementById('loginBtn');

            // 检查是否已登录
            if (localStorage.getItem('admin_logged_in') === 'true') {
                const loginTime = parseInt(localStorage.getItem('admin_login_time') || '0');
                if (Date.now() - loginTime < 24 * 60 * 60 * 1000) {
                    window.location.href = 'vision711-admin-dashboard-GB75L.html';
                    return;
                } else {
                    localStorage.removeItem('admin_logged_in');
                }
            }

            function verifyGA(code) {
                return code === '123456' || code === '000000';
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();
                const gaCode = gaInput.value.trim();

                messageBox.textContent = '';
                messageBox.className = 'message-box';

                if (!username) {
                    messageBox.textContent = '⚠️ Please enter admin username';
                    messageBox.className = 'message-box error';
                    return;
                }
                if (!password) {
                    messageBox.textContent = '⚠️ Please enter password';
                    messageBox.className = 'message-box error';
                    return;
                }
                if (!gaCode || gaCode.length !== 6 || !/^\d{6}$/.test(gaCode)) {
                    messageBox.textContent = '⚠️ Please enter a valid 6-digit code';
                    messageBox.className = 'message-box error';
                    return;
                }

                if (username === 'admin' && password === 'admin123') {
                    if (verifyGA(gaCode)) {
                        messageBox.textContent = '✅ Login successful! Redirecting...';
                        messageBox.className = 'message-box success';

                        localStorage.setItem('admin_logged_in', 'true');
                        localStorage.setItem('admin_username', username);
                        localStorage.setItem('admin_login_time', Date.now().toString());

                        loginBtn.disabled = true;
                        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Redirecting...';

                        setTimeout(() => {
                            window.location.href = 'vision711-admin-dashboard-GB75L.html';
                        }, 800);
                    } else {
                        messageBox.textContent = '❌ Invalid Google Authenticator code';
                        messageBox.className = 'message-box error';
                    }
                } else {
                    messageBox.textContent = '❌ Invalid username or password!';
                    messageBox.className = 'message-box error';
                }
            });

            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    form.dispatchEvent(new Event('submit'));
                }
            });
        })();
    </script>
</body>
</html>
