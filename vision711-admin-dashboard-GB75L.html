<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard · VISION711</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-common.css">
    <style>
        /* ============================================================
           终极修复 - 确保所有页面内容从顶部开始
           ============================================================ */

        /* 1. 主内容 - 使用正常 block 流 */
        .main-content {
            display: block !important;
            margin-left: 240px;
            padding: 24px 32px 40px 32px;
            min-height: 100vh;
            width: auto;
            flex: none !important;
            align-items: stretch !important;
            justify-content: flex-start !important;
        }

        /* 2. 所有页面容器 - 从顶部开始 */
        .page {
            display: none !important;
            position: static !important;
            top: auto !important;
            bottom: auto !important;
            left: auto !important;
            right: auto !important;
            margin-top: 0 !important;
            margin-bottom: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            min-height: auto !important;
            height: auto !important;
            transform: none !important;
            float: none !important;
            clear: both !important;
        }
        .page.active {
            display: block !important;
        }

        /* 3. 所有具体页面 - 强制从顶部开始 */
        #page_users,
        #page_deposits,
        #page_withdrawals,
        #page_transactions,
        #page_partnership,
        #page_content,
        #page_settings {
            display: none !important;
            margin-top: 0 !important;
            padding-top: 0 !important;
            min-height: auto !important;
            height: auto !important;
            position: static !important;
            top: auto !important;
            bottom: auto !important;
            transform: none !important;
        }
        #page_users.active,
        #page_deposits.active,
        #page_withdrawals.active,
        #page_transactions.active,
        #page_partnership.active,
        #page_content.active,
        #page_settings.active {
            display: block !important;
        }

        /* 4. 确保页面内部内容也从顶部开始 */
        #page_partnership > *,
        #page_users > *,
        #page_deposits > *,
        #page_withdrawals > *,
        #page_transactions > *,
        #page_content > *,
        #page_settings > * {
            margin-top: 0 !important;
            padding-top: 0 !important;
        }

        /* 5. Admin Header 保持固定位置 */
        .admin-header {
            position: relative !important;
            top: auto !important;
            bottom: auto !important;
            flex-shrink: 0 !important;
            margin-bottom: 20px !important;
        }

        /* 6. 侧边栏保持固定 */
        .sidebar {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            height: 100vh !important;
            z-index: 100 !important;
        }

        /* 7. Content 子标签页修复 */
        .content-tabs {
            flex-shrink: 0 !important;
            margin-bottom: 20px !important;
        }
        .content-tab-panel {
            display: none !important;
            margin-top: 0 !important;
            padding-top: 0 !important;
        }
        .content-tab-panel.active {
            display: block !important;
        }

        /* 8. 响应式修复 */
        @media (max-width: 768px) {
            .main-content {
                margin-left: 0 !important;
                padding: 16px !important;
                padding-top: 72px !important;
            }
        }
    </style>
</head>
<body>

    <div class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </div>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo">
            <h2>VISION<span>711</span></h2>
            <span class="version">v2.4 · ADMIN</span>
        </div>
        <div class="nav-list">
            <div class="nav-item active" data-page="users"><i class="fas fa-users"></i> Users Management</div>
            <div class="nav-item" data-page="deposits"><i class="fas fa-wallet"></i> Deposits</div>
            <div class="nav-item" data-page="withdrawals"><i class="fas fa-money-bill-wave"></i> Withdrawals</div>
            <div class="nav-item" data-page="transactions"><i class="fas fa-exchange-alt"></i> Transactions</div>
            <div class="nav-item" data-page="partnership"><i class="fas fa-handshake"></i> Partnership</div>
            <div class="nav-item" data-page="content"><i class="fas fa-newspaper"></i> Content Management</div>
            <div class="nav-item" data-page="settings"><i class="fas fa-cog"></i> Settings</div>
        </div>
        <div class="footer-section">
            <button class="footer-item" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Log Out
                <span class="version">v2.4</span>
            </button>
        </div>
    </div>

    <div class="main-content">

        <div class="admin-header">
            <div class="left">
                <h3><i class="fas fa-users"></i> <span id="pageTitle">Users Management</span></h3>
                <span class="date" id="currentDate">Loading...</span>
            </div>
            <div class="right">
                <div class="user-badge">
                    <div class="avatar"><i class="fas fa-user-shield"></i></div>
                    <span class="name" id="adminName">admin</span>
                    <span class="role">Super Admin</span>
                </div>
            </div>
        </div>

        <div id="page_users" class="page active"></div>
        <div id="page_deposits" class="page"></div>
        <div id="page_withdrawals" class="page"></div>
        <div id="page_transactions" class="page"></div>
        <div id="page_partnership" class="page"></div>

        <div id="page_content" class="page">
            <div class="content-tabs" id="contentTabs">
                <button class="tab-btn active" data-tab="carousel"><i class="fas fa-images"></i> Carousel</button>
                <button class="tab-btn" data-tab="announcement"><i class="fas fa-bullhorn"></i> Announcement</button>
            </div>
            <div class="content-tab-panel active" id="panel_carousel"></div>
            <div class="content-tab-panel" id="panel_announcement"></div>
        </div>

        <div id="page_settings" class="page"></div>

    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <h3 id="modalTitle"><i class="fas fa-bullhorn"></i> Add Announcement</h3>
            <div class="sub" id="modalSub">Create a new announcement</div>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn-save" id="modalSaveBtn">Save</button>
                <button class="btn-cancel" id="modalCancelBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            var sidebar = document.getElementById('sidebar');
            var overlay = document.getElementById('overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        function formatDate() {
            var now = new Date();
            return now.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        document.getElementById('currentDate').textContent = formatDate();
        var username = localStorage.getItem('admin_username') || 'admin';
        document.getElementById('adminName').textContent = username;

        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'vision711-admin-login-K8G7Y.html';
        }

        function loadPage(page) {
            if (page === 'users' && typeof window._adminUser !== 'undefined') {
                window._adminUser.refresh();
            }
            if (page === 'partnership' && typeof window._adminPartnership !== 'undefined') {
                window._adminPartnership.load();
            }
            if (page === 'content') {
                if (typeof window._adminCarousel !== 'undefined') window._adminCarousel.load();
                if (typeof window._adminAnnouncement !== 'undefined') window._adminAnnouncement.load();
            }
        }

        var navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(function(item) {
            item.addEventListener('click', function() {
                var page = this.dataset.page;
                document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
                this.classList.add('active');
                document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
                var target = document.getElementById('page_' + page);
                if (target) target.classList.add('active');

                var titleMap = {
                    'users': 'Users Management',
                    'deposits': 'Deposits',
                    'withdrawals': 'Withdrawals',
                    'transactions': 'Transactions',
                    'partnership': 'Partnership',
                    'content': 'Content Management',
                    'settings': 'Settings'
                };
                document.getElementById('pageTitle').textContent = titleMap[page] || page;
                loadPage(page);
                if (window.innerWidth <= 768) toggleSidebar();
            });
        });

        var tabBtns = document.querySelectorAll('.tab-btn');
        tabBtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
                var tab = this.dataset.tab;
                tabBtns.forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                document.querySelectorAll('.content-tab-panel').forEach(function(p) { p.classList.remove('active'); });
                var panel = document.getElementById('panel_' + tab);
                if (panel) panel.classList.add('active');
                if (tab === 'carousel' && typeof window._adminCarousel !== 'undefined') window._adminCarousel.load();
                if (tab === 'announcement' && typeof window._adminAnnouncement !== 'undefined') window._adminAnnouncement.load();
            });
        });

        var logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function() {
                if (confirm('Are you sure you want to logout?')) {
                    localStorage.removeItem('admin_logged_in');
                    localStorage.removeItem('admin_login_time');
                    localStorage.removeItem('admin_username');
                    window.location.href = 'vision711-admin-login-K8G7Y.html';
                }
            });
        }

        var modalOverlay = document.getElementById('modalOverlay');
        var modalCancelBtn = document.getElementById('modalCancelBtn');

        function openModal(title, sub, bodyHTML, onSave) {
            document.getElementById('modalTitle').innerHTML = title;
            document.getElementById('modalSub').textContent = sub;
            document.getElementById('modalBody').innerHTML = bodyHTML;
            modalOverlay.classList.add('show');
            var saveBtn = document.getElementById('modalSaveBtn');
            var newSaveBtn = saveBtn.cloneNode(true);
            saveBtn.parentNode.replaceChild(newSaveBtn, saveBtn);
            newSaveBtn.addEventListener('click', function() {
                if (typeof onSave === 'function') onSave();
            });
        }

        function closeModal() {
            modalOverlay.classList.remove('show');
        }

        if (modalCancelBtn) modalCancelBtn.addEventListener('click', closeModal);
        if (modalOverlay) modalOverlay.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        window._adminModal = { open: openModal, close: closeModal };

        // 默认加载 Users
        setTimeout(function() {
            loadPage('users');
        }, 300);

        console.log('✅ VISION711 Admin Dashboard loaded');
    </script>

    <script src="admin-user.js"></script>
    <script src="admin-partnership.js"></script>
    <script src="admin-carousel.js"></script>
    <script src="admin-announcement.js"></script>

</body>
</html>
