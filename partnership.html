<!-- partnership.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION711 · Partnership</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           Partnership 页面专属样式 - 帝王金最终版
           ============================================================ */

        @media (max-width: 767px) {
            .top-banner-wrapper { display: none !important; }
        }

        @media (min-width: 768px) {
            .app-container {
                display: block !important;
                padding: 0 !important;
                min-height: 100vh;
            }

            /* 🔥 Sidebar 固定 */
            .sidebar {
                width: 220px !important;
                flex-shrink: 0 !important;
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                height: 100vh !important;
                display: flex !important;
                flex-direction: column !important;
                background: rgba(10, 10, 32, 0.75) !important;
                backdrop-filter: blur(16px) !important;
                border-right: 1px solid rgba(255, 255, 255, 0.06) !important;
                padding: 24px 16px 30px !important;
                overflow-y: auto !important;
                z-index: 10 !important;
            }

            /* 🔥 主内容留出侧边栏空间 */
            .main-content {
                flex: 1 !important;
                padding: 24px 12px 30px 20px !important;
                max-width: none !important;
                min-height: 100vh;
                overflow-x: hidden;
                margin-left: 232px !important;
            }

            /* 电脑版隐藏手机元素 */
            .mobile-header {
                display: none !important;
            }
            .bottom-nav {
                display: none !important;
            }
        }

        @media (max-width: 767px) {
            .sidebar { display: none !important; }
            .app-container {
                display: block !important;
                padding: 12px 12px 80px !important;
                min-height: 100vh;
                width: 100%;
                background: transparent !important;
            }
            .main-content {
                display: block !important;
                padding: 0 !important;
                max-width: 100% !important;
                min-height: auto !important;
                flex: none !important;
            }
            body {
                background-image: url('https://jkbpbjhrgbnzexvjvxgt.supabase.co/storage/v1/object/public/hero-background/mobile-hero-background.png');
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                background-repeat: no-repeat;
                background-color: #06060f;
            }
        }

        @media (min-width: 768px) {
            body {
                background-image: url('https://jkbpbjhrgbnzexvjvxgt.supabase.co/storage/v1/object/public/hero-background/desktop-hero-background.png');
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                background-repeat: no-repeat;
                background-color: #06060f;
            }
        }

        /* ===== Partnership Grid ===== */
        .partnership-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ============================================================
           帝王金卡片 - 最终版
           ============================================================ */
        .card-royal {
            position: relative;
            background: 
                repeating-linear-gradient(90deg, transparent 0px, transparent 3px, rgba(255, 215, 0, 0.02) 3px, rgba(255, 215, 0, 0.02) 4px),
                linear-gradient(145deg, #0a0a12 0%, #1a1a28 15%, #0d0d18 30%, #1a1a28 50%, #0d0d18 70%, #1a1a28 85%, #0a0a12 100%);
            border-radius: 28px;
            padding: 32px 24px 28px;
            text-align: center;
            box-shadow: 
                0 10px 60px rgba(0, 0, 0, 0.7),
                inset 0 1px 0 rgba(255, 215, 0, 0.08);
            transition: all 0.5s ease;
            overflow: visible;
            z-index: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ===== 四边金边 + 呼吸发光 ===== */
        .card-royal::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 30px;
            padding: 3px;
            background: linear-gradient(135deg, #ffd700, #ffed4a, #d4a000, #b8860b);
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            z-index: -1;
            pointer-events: none;
            animation: breatheGold 2.5s ease-in-out infinite;
        }

        @keyframes breatheGold {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .card-royal::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.05), transparent 40%, transparent 60%, rgba(255, 215, 0, 0.03));
            z-index: -1;
            pointer-events: none;
            animation: breatheGold 2.5s ease-in-out infinite 0.3s;
        }

        .card-royal:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 70px rgba(0, 0, 0, 0.7), 0 0 100px rgba(255, 215, 0, 0.04);
        }

        .card-royal>* {
            position: relative;
            z-index: 1;
        }

        /* ===== Logo - 直接用原图，不加圆框，放大 ===== */
        .card-royal .card-logo {
            width: 140px;
            height: auto;
            margin: 0 auto 12px;
            display: block;
            transition: all 0.4s ease;
        }

        .card-royal:hover .card-logo {
            transform: scale(1.05);
        }

        /* ===== 标题 ===== */
        .card-royal .card-title {
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 2px;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ffd700, #ffed4a, #ffd700);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: goldShine 4s linear infinite;
        }

        @keyframes goldShine {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        /* ===== 金色分隔线 ===== */
        .card-royal .card-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, #ffed4a, #ffd700, transparent);
            margin: 10px 0 16px;
            border-radius: 2px;
            opacity: 0.4;
        }

        /* ===== 信息 - 大字体金色3D ===== */
        .card-royal .card-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 4px 0;
            flex: 1;
        }

        .card-royal .card-info .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0;
        }

        .card-royal .card-info .info-row .label {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ===== fa 图标 - 金色金属3D ===== */
        .card-royal .card-info .info-row .label i {
            color: #ffd700;
            font-size: 1.1rem;
            width: 22px;
            text-align: center;
            text-shadow: 
                0 2px 4px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(255, 215, 0, 0.1);
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.3));
        }

        /* ===== 数值 - 金色金属3D ===== */
        .card-royal .card-info .info-row .value-gold {
            color: #ffd700;
            font-weight: 900;
            font-size: 1.3rem;
            text-shadow: 
                0 2px 4px rgba(0, 0, 0, 0.6),
                0 0 30px rgba(255, 215, 0, 0.08);
            letter-spacing: 1px;
        }

        .card-royal .card-info .info-row .value-green {
            color: #ffd700;
            font-weight: 900;
            font-size: 1.3rem;
            text-shadow: 
                0 2px 4px rgba(0, 0, 0, 0.6),
                0 0 30px rgba(255, 215, 0, 0.08);
            letter-spacing: 1px;
        }

        .card-royal .card-info .info-row .value-blue {
            color: #ffd700;
            font-weight: 900;
            font-size: 1.3rem;
            text-shadow: 
                0 2px 4px rgba(0, 0, 0, 0.6),
                0 0 30px rgba(255, 215, 0, 0.08);
            letter-spacing: 1px;
        }

        /* ===== Description ===== */
        .card-royal .card-info .desc-row {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 6px 0 2px;
            gap: 10px;
        }

        .card-royal .card-info .desc-row i {
            color: #ffd700;
            font-size: 1rem;
            width: 22px;
            text-align: center;
            text-shadow: 
                0 2px 4px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(255, 215, 0, 0.1);
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.3));
        }

        .card-royal .card-info .desc-row .desc-text {
            color: rgba(255, 255, 255, 0.55);
            font-size: 1rem;
            font-style: italic;
            letter-spacing: 0.3px;
            line-height: 1.5;
            text-align: left;
        }

        /* ===== 按钮区域 - 上下排列 ===== */
        .card-royal .card-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 18px;
        }

        .card-royal .btn-claim {
            background: linear-gradient(145deg, #ffd700, #e6b800, #d4a000);
            border: none;
            color: #0a0a12;
            padding: 16px 0;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 6px 40px rgba(255, 215, 0, 0.25),
                inset 0 2px 0 rgba(255, 255, 255, 0.2);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 1px;
            width: 100%;
        }

        .card-royal .btn-claim:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 50px rgba(255, 215, 0, 0.35);
        }

        .card-royal .btn-telegram {
            background: linear-gradient(145deg, #00b4ff, #0090e0, #0077cc);
            border: none;
            color: #fff;
            padding: 16px 0;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 0.5px;
            box-shadow: 
                0 6px 40px rgba(0, 180, 255, 0.2),
                inset 0 2px 0 rgba(255, 255, 255, 0.12);
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .card-royal .btn-telegram::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 35%, rgba(255, 255, 255, 0.15) 45%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0.15) 55%, transparent 65%);
            animation: metalShine 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes metalShine {
            0% { transform: translate(-30%, -30%) rotate(0deg); opacity: 0; }
            25% { opacity: 1; }
            75% { opacity: 1; }
            100% { transform: translate(30%, 30%) rotate(180deg); opacity: 0; }
        }

        .card-royal .btn-telegram:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 50px rgba(0, 180, 255, 0.3);
            background: linear-gradient(145deg, #00c8ff, #00a0e8, #0088d4);
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.15);
            grid-column: 1 / -1;
        }
        .empty-state i {
            font-size: 3rem;
            color: rgba(255, 215, 0, 0.05);
            display: block;
            margin-bottom: 12px;
        }
        .empty-state .empty-title {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.2);
            margin-bottom: 4px;
        }
        .empty-state .empty-sub {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.08);
        }

        /* ===== 页面标题 ===== */
        .partnership-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .partnership-header h2 {
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
        }
        .partnership-header h2 i {
            color: #ffd700;
            margin-right: 12px;
        }
        .partnership-header p {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.85rem;
            margin-top: 4px;
            letter-spacing: 3px;
        }

        /* ===== 手机顶部导航 ===== */
        .mobile-header {
            display: flex !important;
            align-items: center !important;
            justify-content: flex-start !important;
            gap: 6px !important;
            margin-bottom: 16px !important;
            width: 100% !important;
            flex-direction: row !important;
        }
        .mobile-header .hamburger-wrapper {
            order: 1 !important;
            flex-shrink: 0 !important;
            margin-right: 4px !important;
        }
        .mobile-header .mobile-header-right {
            display: flex !important;
            align-items: center !important;
            gap: 10px !important;
            flex-shrink: 0 !important;
            margin-left: auto !important;
            justify-content: flex-end !important;
            order: 2 !important;
        }
        .mobile-header .logo-metal {
            order: 3 !important;
            flex-shrink: 0 !important;
            margin-left: 2px !important;
        }
        .mobile-header .logo-metal canvas {
            height: 60px !important;
            width: auto !important;
            max-height: 60px !important;
            display: block !important;
            border-radius: 6px !important;
        }
        .mobile-header .badge-vip,
        .mobile-header .lang-switcher,
        .mobile-header .user-avatar-metal { display: none !important; }
        .mobile-header .header-auth-buttons {
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
            flex-shrink: 0 !important;
            order: 2 !important;
        }
        .mobile-header .register-wrapper {
            display: inline-block !important;
            flex-shrink: 0 !important;
        }
        .mobile-header .register-btn {
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 700 !important;
            font-size: 0.75rem !important;
            padding: 8px 18px !important;
            border-radius: 8px !important;
            text-decoration: none !important;
            transition: all 0.3s ease !important;
            white-space: nowrap !important;
            display: inline-block !important;
            background: transparent !important;
            border: 1px solid rgba(0, 180, 255, 0.4) !important;
            color: #00b4ff !important;
            line-height: 1.4 !important;
            letter-spacing: 0.5px !important;
            cursor: pointer !important;
            animation: breatheGlowTop 2.5s ease-in-out infinite;
        }
        .mobile-header .register-btn:hover {
            transform: translateY(-2px) !important;
            animation-play-state: paused;
            border-color: rgba(0, 180, 255, 0.9) !important;
            background: rgba(0, 180, 255, 0.08) !important;
            box-shadow: 0 6px 30px rgba(0, 180, 255, 0.25) !important;
        }
        @keyframes breatheGlowTop {
            0% { box-shadow: 0 0 8px rgba(0, 180, 255, 0.1), inset 0 0 8px rgba(0, 180, 255, 0.04); border-color: rgba(0, 180, 255, 0.35); }
            50% { box-shadow: 0 0 35px rgba(0, 180, 255, 0.35), inset 0 0 35px rgba(0, 180, 255, 0.12); border-color: rgba(0, 180, 255, 0.7); }
            100% { box-shadow: 0 0 8px rgba(0, 180, 255, 0.1), inset 0 0 8px rgba(0, 180, 255, 0.04); border-color: rgba(0, 180, 255, 0.35); }
        }
        .mobile-header .login-btn {
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 700 !important;
            font-size: 0.75rem !important;
            padding: 8px 22px !important;
            border-radius: 8px !important;
            text-decoration: none !important;
            transition: all 0.3s ease !important;
            white-space: nowrap !important;
            display: inline-block !important;
            background: linear-gradient(145deg, #00b4ff 0%, #0090e0 30%, #00c8ff 60%, #0077cc 100%) !important;
            border: none !important;
            color: #fff !important;
            box-shadow: 0 2px 16px rgba(0, 180, 255, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.2) !important;
            line-height: 1.4 !important;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3) !important;
            letter-spacing: 0.5px !important;
        }
        .mobile-header .login-btn:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 6px 30px rgba(0, 180, 255, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.25) !important;
            background: linear-gradient(145deg, #00c8ff 0%, #00a0e8 30%, #00d4ff 60%, #0088d4 100%) !important;
        }
        .mobile-header .mobile-header-slogan { display: none; }

        /* ===== 手机底部导航 ===== */
        .bottom-nav {
            display: flex !important;
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            background: repeating-linear-gradient(90deg, transparent 0px, transparent 3px, rgba(255, 255, 255, 0.015) 3px, rgba(255, 255, 255, 0.015) 4px), linear-gradient(180deg, #06060f 0%, #0a0a20 100%) !important;
            border-top: 1px solid rgba(0, 180, 255, 0.08) !important;
            padding: 6px 0 env(safe-area-inset-bottom, 6px) 0 !important;
            z-index: 1000 !important;
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.6) !important;
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            margin: 0 !important;
            border-radius: 0 !important;
            justify-content: space-around !important;
        }
        .bottom-nav .nav-item {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            color: rgba(255, 255, 255, 0.2) !important;
            font-size: 0.55rem !important;
            gap: 2px !important;
            text-decoration: none !important;
            padding: 4px 10px !important;
            position: relative !important;
        }
        .bottom-nav .nav-item i {
            font-size: 1.2rem !important;
            color: rgba(255, 255, 255, 0.2) !important;
        }
        .bottom-nav .nav-item.active i,
        .bottom-nav .nav-item.active span { color: #00b4ff !important; }
        .bottom-nav .nav-item.active span { font-weight: 600 !important; }
        .bottom-nav .nav-item.active::after {
            content: '' !important;
            position: absolute !important;
            top: -1px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 20px !important;
            height: 2px !important;
            background: linear-gradient(90deg, #00b4ff, #ffd700) !important;
            border-radius: 2px !important;
            box-shadow: 0 0 10px rgba(0, 180, 255, 0.3) !important;
        }
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .bottom-nav { padding-bottom: max(6px, env(safe-area-inset-bottom)) !important; }
        }

        /* ===== Hamburger 样式 ===== */
        .hamburger-btn {
            display: flex !important;
            flex-direction: column;
            gap: 4px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px;
            z-index: 1001;
            position: relative;
            transition: 0.3s;
        }
        .hamburger-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 2px;
            transition: all 0.3s ease;
            transform-origin: center;
        }
        .hamburger-btn.menu-open span {
            opacity: 0 !important;
            transform: scale(0.5) !important;
        }
        .hamburger-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .hamburger-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        .hamburger-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            max-width: 80vw;
            min-width: 0;
            height: 100%;
            background: rgba(10, 10, 32, 0.55);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 18px 30px;
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: 4px 0 40px rgba(0, 0, 0, 0.4), inset 0 0 80px rgba(0, 180, 255, 0.03);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .hamburger-menu * {
            max-width: 100%;
            box-sizing: border-box;
            word-wrap: break-word;
        }
        .hamburger-menu.open { transform: translateX(0); }
        .hamburger-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 20px;
            flex-shrink: 0;
            gap: 8px;
        }
        .hamburger-header .logo-metal canvas {
            display: block;
            width: auto;
            height: 100px;
            border-radius: 12px;
        }
        .hamburger-slogan {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-style: italic;
            font-size: 1.0rem;
            letter-spacing: 2px;
            white-space: nowrap;
            flex-shrink: 0;
            display: inline-block;
            text-align: center;

        .hamburger-nav {

<script>
    (function() {
        'use strict';

        var SUPABASE_URL = 'https://jkbpbjhrgbnzexvjvxgt.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprYnBiamhyZ2JuemV4dmp2eGd0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mzc3MDcyMSwiZXhwIjoyMDk5MzQ2NzIxfQ.cZumC1R8_pGEfQv-BBfqJXAExCYOC7mdDj4OmkfdjRw';

        function loadPartnershipData() {
            var container = document.getElementById('partnershipGrid');
            if (!container) return;

            if (typeof supabase === 'undefined') {
                loadFromLocalStorage();
                return;
            }

            var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            sb.from('partnership_items')
                .select('*')
                .order('created_at', { ascending: true })
                .then(function(res) {
                    if (res.error) {
                        console.error('加载失败:', res.error);
                        loadFromLocalStorage();
                        return;
                    }
                    renderCards(res.data || []);
                })
                .catch(function(err) {
                    console.error('异常:', err);
                    loadFromLocalStorage();
                });
        }

        function loadFromLocalStorage() {
            var saved = localStorage.getItem('partnership_items');
            if (saved) {
                try {
                    renderCards(JSON.parse(saved));
                    return;
                } catch (e) {}
            }
            renderCards([]);
        }

        function renderCards(items) {
            var container = document.getElementById('partnershipGrid');
            if (!container) return;

            if (!items || items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-crown"></i>
                        <div class="empty-title">No partnership programs available</div>
                        <div class="empty-sub">Check back soon for exclusive offers</div>
                    </div>
                `;
                return;
            }

            var html = '';
            items.forEach(function(item) {
                var logoHTML = '';
                if (item.logo_url && item.logo_url.startsWith('http')) {
                    logoHTML = `<img src="${item.logo_url}" alt="${item.title}" class="card-logo">`;
                } else {
                    logoHTML = `<div style="font-size:4rem; color:#ffd700; margin-bottom:8px;"><i class="fas fa-crown"></i></div>`;
                }

                html += `
                    <div class="card-royal">
                        ${logoHTML}

                        <div class="card-title">${item.title || 'VISION711'}</div>
                        <div class="card-divider"></div>

                        <div class="card-info">
                            <div class="info-row">
                                <span class="label"><i class="fas fa-gift"></i> Welcome Bonus</span>
                                <span class="value-gold">${item.welcome_bonus || 'RM 88'}</span>
                            </div>
                            <div class="info-row">
                                <span class="label"><i class="fas fa-sync-alt"></i> Daily Rebate</span>
                                <span class="value-green">${item.daily_rebate || '5%'}</span>
                            </div>
                            <div class="info-row">
                                <span class="label"><i class="fas fa-calendar-week"></i> Weekly Bonus</span>
                                <span class="value-blue">${item.weekly_bonus || 'RM 188'}</span>
                            </div>
                            <div class="desc-row">
                                <i class="fas fa-align-left"></i>
                                <span class="desc-text">${item.description || 'Exclusive partnership reward for our valued partners'}</span>
                            </div>
                        </div>

                        <div class="card-actions">
                            <a href="deposit.html" class="btn-claim"><i class="fas fa-gift"></i> Claim Now</a>
                            <a href="https://t.me/vision711" target="_blank" class="btn-telegram"><i class="fab fa-telegram-plane"></i> Join Telegram</a>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // ===== Logo 流光 =====
        function initLogos() {
            ['sidebarLogoCanvas', 'headerLogoCanvas'].forEach(function(id) {
                var canvas = document.getElementById(id);
                if (canvas) initLogoCanvas(canvas);
            });
        }

        function initLogoCanvas(canvas) {
            var ctx = canvas.getContext('2d');
            var img = new Image();
            img.crossOrigin = 'anonymous';
            img.src = 'https://jkbpbjhrgbnzexvjvxgt.supabase.co/storage/v1/object/public/hero-background/logo.png';

            var logoData = null, w = 0, h = 0, startTime = performance.now();

            img.onload = function() {
                w = img.width; h = img.height;
                canvas.width = w; canvas.height = h;
                ctx.drawImage(img, 0, 0);
                logoData = ctx.getImageData(0, 0, w, h);
                ctx.clearRect(0, 0, w, h);
                requestAnimationFrame(drawFrame);
            };

            function drawFrame(timestamp) {
                if (!logoData) return;
                var elapsed = (timestamp - startTime) / 1000;
                var waitTime = 1.0, scanDuration = 1.2, totalTime = waitTime + scanDuration;
                var timeInCycle = elapsed % totalTime;
                var progress = timeInCycle < waitTime ? -1 : 1 - (timeInCycle - waitTime) / scanDuration;
                ctx.clearRect(0, 0, w, h);
                ctx.globalAlpha = 0.9;
                ctx.drawImage(img, 0, 0);
                ctx.globalAlpha = 1.0;
                var imageData = ctx.getImageData(0, 0, w, h);
                var data = imageData.data;
                var barWidth = Math.max(20, w * 0.25);
                var centerX = progress * (w + barWidth) - barWidth / 2;
                for (var y = 0; y < h; y++) {
                    for (var x = 0; x < w; x++) {
                        var idx = (y * w + x) * 4;
                        if (logoData.data[idx + 3] < 128) continue;
                        var dist = Math.abs(x - centerX);
                        if (dist > barWidth / 2) continue;
                        var strength = 1 - (dist / (barWidth / 2));
                        var alpha = strength * 0.55;
                        data[idx] = Math.min(255, data[idx] + 180 * alpha);
                        data[idx + 1] = Math.min(255, data[idx + 1] + 180 * alpha);
                        data[idx + 2] = Math.min(255, data[idx + 2] + 150 * alpha);
                    }
                }
                ctx.putImageData(imageData, 0, 0);
                requestAnimationFrame(drawFrame);
            }
        }

        // ===== 启动 =====
        document.addEventListener('DOMContentLoaded', function() {
            loadPartnershipData();
            initLogos();

            var savedLang = localStorage.getItem('preferred_language') || 'en';
            document.querySelectorAll('.lang-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.lang === savedLang);
                btn.addEventListener('click', function() {
                    var lang = this.dataset.lang;
                    localStorage.setItem('preferred_language', lang);
                    document.querySelectorAll('.lang-btn').forEach(function(b) {
                        b.classList.toggle('active', b.dataset.lang === lang);
                    });
                    location.reload();
                });
            });

            var isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            var authButtons = document.querySelector('.header-auth-buttons');
            var slogan = document.querySelector('.mobile-header-slogan');
            if (authButtons && slogan) {
                if (isLoggedIn) {
                    authButtons.style.display = 'none';
                    slogan.style.display = 'inline-block';
                    slogan.textContent = 'Play Safe, Win Safe';
                } else {
                    authButtons.style.display = 'flex';
                    slogan.style.display = 'none';
                }
            }
        });

        console.log('✅ Partnership page loaded');
    })();
</script>
