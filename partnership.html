<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION711 · Partnership</title>
    <!-- 添加 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           Partnership 页面专属样式
           ============================================================ */

        @media (max-width: 767px) {
            .top-banner-wrapper { display: none !important; }
        }

        @media (min-width: 768px) {
            .app-container {
                display: flex !important;
                padding: 0 !important;
                min-height: 100vh;
            }
            .sidebar {
                width: 220px !important;
                flex-shrink: 0 !important;
                position: sticky !important;
                top: 0 !important;
                height: 100vh !important;
                display: flex !important;
                flex-direction: column !important;
                background: rgba(10, 10, 32, 0.75) !important;
                backdrop-filter: blur(16px) !important;
                border-right: 1px solid rgba(255, 255, 255, 0.06) !important;
                padding: 24px 16px 30px !important;
                overflow-y: auto !important;
                z-index: 10 !important;
            }
            .main-content {
                flex: 1 !important;
                padding: 24px 12px 30px 0 !important;
                max-width: none !important;
                min-height: 100vh;
                overflow-x: hidden;
                margin-left: -232px;
            }
        }

        @media (max-width: 767px) {
            .sidebar { display: none !important; }
            .app-container {
                display: block !important;
                padding: 12px 12px 80px !important;
                min-height: 100vh;
                width: 100%;
                background: transparent !important;
            }
            .main-content {
                display: block !important;
                padding: 0 !important;
                max-width: 100% !important;
                min-height: auto !important;
                flex: none !important;
            }
            body {
                background-image: url('https://jkbpbjhrgbnzexvjvxgt.supabase.co/storage/v1/object/public/hero-background/mobile-hero-background.png');
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                background-repeat: no-repeat;
                background-color: #06060f;
            }
        }

        @media (min-width: 768px) {
            body {
                background-image: url('https://jkbpbjhrgbnzexvjvxgt.supabase.co/storage/v1/object/public/hero-background/desktop-hero-background.png');
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                background-repeat: no-repeat;
                background-color: #06060f;
            }
        }

        /* ===== Partnership 卡片网格 ===== */
        .partnership-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            max-width: 900px;
            margin: 0 auto;
        }

        .partnership-card {
            background: repeating-linear-gradient(90deg, transparent 0px, transparent 3px, rgba(255, 255, 255, 0.015) 3px, rgba(255, 255, 255, 0.015) 4px), linear-gradient(145deg, #0a0a20 0%, #141435 25%, #1a1a4a 50%, #101030 75%, #0a0a20 100%);
            border: 1px solid transparent;
            background-image: linear-gradient(var(--card-bg, #0d0d2a), var(--card-bg, #0d0d2a)), linear-gradient(135deg, rgba(0, 180, 255, 0.25), rgba(255, 215, 0, 0.15), rgba(0, 180, 255, 0.25));
            background-origin: padding-box, border-box;
            background-clip: padding-box, border-box;
            border-radius: 20px;
            padding: 20px 16px 18px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .partnership-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 180, 255, 0.3);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 180, 255, 0.05);
        }

        .partnership-card .card-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 10px;
            display: block;
            border: 2px solid rgba(0, 180, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        .partnership-card .card-logo-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: rgba(0, 180, 255, 0.08);
            border: 2px solid rgba(0, 180, 255, 0.15);
            color: #00b4ff;
        }

        .partnership-card .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .partnership-card .card-value {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ffed4a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .partnership-card .card-desc {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin: 4px 0 12px;
            min-height: 20px;
        }

        .partnership-card .card-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .partnership-card .card-actions .btn-claim {
            background: linear-gradient(145deg, #ffd700, #d4a000);
            border: none;
            color: #0a0a20;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.25);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .partnership-card .card-actions .btn-claim:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.35);
        }

        .partnership-card .card-actions .btn-telegram {
            background: transparent;
            border: 1px solid rgba(0, 180, 255, 0.2);
            color: #00b4ff;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .partnership-card .card-actions .btn-telegram:hover {
            background: rgba(0, 180, 255, 0.08);
            border-color: rgba(0, 180, 255, 0.4);
            transform: translateY(-2px);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.2);
            grid-column: 1 / -1;
        }
        .empty-state i {
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.05);
            display: block;
            margin-bottom: 12px;
        }

        /* 页面标题 */
        .partnership-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .partnership-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }
        .partnership-header h2 i {
            color: #ffd700;
            margin-right: 10px;
        }
        .partnership-header p {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        @media (max-width: 480px) {
            .partnership-grid { gap: 12px; }
            .partnership-card { padding: 16px 12px 14px; }
            .partnership-card .card-logo,
            .partnership-card .card-logo-placeholder {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
            .partnership-card .card-title { font-size: 0.9rem; }
            .partnership-card .card-value { font-size: 1rem; }
            .partnership-card .card-actions .btn-claim,
            .partnership-card .card-actions .btn-telegram {
                font-size: 0.65rem;
                padding: 6px 16px;
            }
        }

        @media (min-width: 768px) {
            .partnership-grid { max-width: 900px; }
            .partnership-card { padding: 24px 20px 20px; }
            .partnership-card .card-logo,
            .partnership-card .card-logo-placeholder {
                width: 100px;
                height: 100px;
                font-size: 3rem;
            }
            .partnership-card .card-value { font-size: 1.4rem; }
        }

        @media (min-width: 1200px) {
            .partnership-grid { max-width: 1100px; }
        }

        /* ===== 手机顶部导航 ===== */
        .mobile-header {
            display: flex !important;
            align-items: center !important;
            justify-content: flex-start !important;
            gap: 6px !important;
            margin-bottom: 16px !important;
            width: 100% !important;
            flex-direction: row !important;
        }
        .mobile-header .hamburger-wrapper {
            order: 1 !important;
            flex-shrink: 0 !important;
            margin-right: 4px !important;
        }
        .mobile-header .mobile-header-right {
            display: flex !important;
            align-items: center !important;
            gap: 10px !important;
            flex-shrink: 0 !important;
            margin-left: auto !important;
            justify-content: flex-end !important;
            order: 2 !important;
        }
        .mobile-header .logo-metal {
            order: 3 !important;
            flex-shrink: 0 !important;
            margin-left: 2px !important;
        }
        .mobile-header .logo-metal canvas {
            height: 60px !important;
            width: auto !important;
            max-height: 60px !important;
            display: block !important;
            border-radius: 6px !important;
        }
        .mobile-header .badge-vip,
        .mobile-header .lang-switcher,
        .mobile-header .user-avatar-metal { display: none !important; }
        .mobile-header .header-auth-buttons {
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
            flex-shrink: 0 !important;
            order: 2 !important;
        }
        .mobile-header .register-wrapper {
            display: inline-block !important;
            flex-shrink: 0 !important;
        }
        .mobile-header .register-btn {
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 700 !important;
            font-size: 0.75rem !important;
            padding: 8px 18px !important;
            border-radius: 8px !important;
            text-decoration: none !important;
            transition: all 0.3s ease !important;
            white-space: nowrap !important;
            display: inline-block !important;
            background: transparent !important;
            border: 1px solid rgba(0, 180, 255, 0.4) !important;
            color: #00b4ff !important;
            line-height: 1.4 !important;
            letter-spacing: 0.5px !important;
            cursor: pointer !important;
            animation: breatheGlowTop 2.5s ease-in-out infinite;
        }
        .mobile-header .register-btn:hover {
            transform: translateY(-2px) !important;
            animation-play-state: paused;
            border-color: rgba(0, 180, 255, 0.9) !important;
            background: rgba(0, 180, 255, 0.08) !important;
            box-shadow: 0 6px 30px rgba(0, 180, 255, 0.25) !important;
        }
        @keyframes breatheGlowTop {
            0% { box-shadow: 0 0 8px rgba(0, 180, 255, 0.1), inset 0 0 8px rgba(0, 180, 255, 0.04); border-color: rgba(0, 180, 255, 0.35); }
            50% { box-shadow: 0 0 35px rgba(0, 180, 255, 0.35), inset 0 0 35px rgba(0, 180, 255, 0.12); border-color: rgba(0, 180, 255, 0.7); }
            100% { box-shadow: 0 0 8px rgba(0, 180, 255, 0.1), inset 0 0 8px rgba(0, 180, 255, 0.04); border-color: rgba(0, 180, 255, 0.35); }
        }
        .mobile-header .login-btn {
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 700 !important;
            font-size: 0.75rem !important;
            padding: 8px 22px !important;
            border-radius: 8px !important;
            text-decoration: none !important;
            transition: all 0.3s ease !important;
            white-space: nowrap !important;
            display: inline-block !important;
            background: linear-gradient(145deg, #00b4ff 0%, #0090e0 30%, #00c8ff 60%, #0077cc 100%) !important;
            border: none !important;
            color: #fff !important;
            box-shadow: 0 2px 16px rgba(0, 180, 255, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.2) !important;
            line-height: 1.4 !important;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3) !important;
            letter-spacing: 0.5px !important;
        }
        .mobile-header .login-btn:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 6px 30px rgba(0, 180, 255, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.25) !important;
            background: linear-gradient(145deg, #00c8ff 0%, #00a0e8 30%, #00d4ff 60%, #0088d4 100%) !important;
        }
        .mobile-header .mobile-header-slogan { display: none; }

        /* ===== 手机底部导航 ===== */
        .bottom-nav {
            display: flex !important;
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            background: repeating-linear-gradient(90deg, transparent 0px, transparent 3px, rgba(255, 255, 255, 0.015) 3px, rgba(255, 255, 255, 0.015) 4px), linear-gradient(180deg, #06060f 0%, #0a0a20 100%) !important;
            border-top: 1px solid rgba(0, 180, 255, 0.08) !important;
            padding: 6px 0 env(safe-area-inset-bottom, 6px) 0 !important;
            z-index: 1000 !important;
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.6) !important;
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            margin: 0 !important;
            border-radius: 0 !important;
            justify-content: space-around !important;
        }
        .bottom-nav .nav-item {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            color: rgba(255, 255, 255, 0.2) !important;
            font-size: 0.55rem !important;
            gap: 2px !important;
            text-decoration: none !important;
            padding: 4px 10px !important;
            position: relative !important;
        }
        .bottom-nav .nav-item i {
            font-size: 1.2rem !important;
            color: rgba(255, 255, 255, 0.2) !important;
        }
        .bottom-nav .nav-item.active i,
        .bottom-nav .nav-item.active span { color: #00b4ff !important; }
        .bottom-nav .nav-item.active span { font-weight: 600 !important; }
        .bottom-nav .nav-item.active::after {
            content: '' !important;
            position: absolute !important;
            top: -1px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 20px !important;
            height: 2px !important;
            background: linear-gradient(90deg, #00b4ff, #ffd700) !important;
            border-radius: 2px !important;
            box-shadow: 0 0 10px rgba(0, 180, 255, 0.3) !important;
        }
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .bottom-nav { padding-bottom: max(6px, env(safe-area-inset-bottom)) !important; }
        }

        /* ===== Hamburger 样式 ===== */
        .hamburger-btn {
            display: flex !important;
            flex-direction: column;
            gap: 4px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px;
            z-index: 1001;
            position: relative;
            transition: 0.3s;
        }
        .hamburger-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 2px;
            transition: all 0.3s ease;
            transform-origin: center;
        }
        .hamburger-btn.menu-open span {
            opacity: 0 !important;
            transform: scale(0.5) !important;
        }
        .hamburger-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .hamburger-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        .hamburger-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            max-width: 80vw;
            height: 100%;
            background: rgba(10, 10, 32, 0.55);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 18px 30px;
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            box-shadow: 4px 0 40px rgba(0, 0, 0, 0.4), inset 0 0 80px rgba(0, 180, 255, 0.03);
            display: flex;
            flex-direction: column;
        }
        .hamburger-menu.open { transform: translateX(0); }
        .hamburger-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 20px;
            flex-shrink: 0;
            gap: 8px;
        }
        .hamburger-header .logo-metal canvas {
            display: block;
            width: auto;
            height: 100px;
            border-radius: 12px;
        }
        .hamburger-slogan {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-style: italic;
            font-size: 1.0rem;
            letter-spacing: 2px;
            white-space: nowrap;
            flex-shrink: 0;
            display: inline-block;
            text-align: center;
            background: linear-gradient(120deg, #a0e9ff 0%, #4db8ff 20%, #ffffff 45%, #6fcbff 70%, #a0e9ff 100%);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerGlacier 5s linear infinite;
            text-shadow: none;
        }
        @keyframes shimmerGlacier {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }
        .hamburger-nav {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 16px;
            flex: 1;
            overflow-y: auto;
        }
        .hamburger-nav a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }
        .hamburger-nav a i {
            width: 22px;
            text-align: center;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }
        .hamburger-nav a:hover {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.7);
        }
        .hamburger-nav a:hover i { color: rgba(0, 180, 255, 0.5); }
        .hamburger-nav a.active {
            background: rgba(0, 180, 255, 0.08);
            border: 1px solid rgba(0, 180, 255, 0.08);
            color: #fff;
        }
        .hamburger-nav a.active i { color: #00b4ff; }
        .hamburger-nav a.active::before {
            content: '';
            position: absolute;
            left: -1px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: linear-gradient(180deg, #00b4ff, #ffd700);
            border-radius: 0 3px 3px 0;
            box-shadow: 0 0 20px rgba(0, 180, 255, 0.3);
        }
        .hamburger-lang {
            display: flex;
            gap: 8px;
            padding: 12px 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 4px;
            flex-shrink: 0;
        }
        .hamburger-lang .lang-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.2);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.6rem;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }
        .hamburger-lang .lang-btn.active {
            border-color: rgba(0, 180, 255, 0.2);
            color: rgba(255, 255, 255, 0.5);
            background: rgba(0, 180, 255, 0.05);
        }
        .hamburger-lang .lang-btn:hover {
            border-color: rgba(0, 180, 255, 0.3);
            color: rgba(255, 255, 255, 0.5);
        }
        .hamburger-footer {
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }
        .hamburger-footer a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.12);
            text-decoration: none;
            font-size: 0.65rem;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .hamburger-footer a:hover {
            color: rgba(0, 180, 255, 0.3);
            background: rgba(255, 255, 255, 0.02);
        }
        .hamburger-user {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 12px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .hamburger-user .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: repeating-linear-gradient(90deg, transparent 0px, transparent 2px, rgba(255, 255, 255, 0.03) 2px, rgba(255, 255, 255, 0.03) 3px), linear-gradient(145deg, #0d0d30, #1a1a4a);
            border: 2px solid rgba(0, 180, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #00b4ff;
            flex-shrink: 0;
        }
        .hamburger-user .info { flex: 1; min-width: 0; }
        .hamburger-user .info .name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
        }
        .hamburger-user .info .role {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
        }
        .hamburger-user .vip-badge {
            background: linear-gradient(145deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.05));
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #ffd700;

<!-- ============================================================
    Partnership 数据加载 - 从 partnership_items 表读取
   ============================================================ -->
<script>
    (function() {
        'use strict';

        var SUPABASE_URL = 'https://jkbpbjhrgbnzexvjvxgt.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprYnBiamhyZ2JuemV4dmp2eGd0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mzc3MDcyMSwiZXhwIjoyMDk5MzQ2NzIxfQ.cZumC1R8_pGEfQv-BBfqJXAExCYOC7mdDj4OmkfdjRw';

        function loadPartnershipData() {
            var container = document.getElementById('partnershipGrid');
            if (!container) return;

            // 检查 Supabase 是否可用
            if (typeof supabase === 'undefined') {
                console.warn('⚠️ Supabase not loaded, using localStorage');
                loadFromLocalStorage();
                return;
            }

            var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            console.log('📥 Fetching partnership_items from Supabase...');

            sb.from('partnership_items')
                .select('*')
                .order('created_at', { ascending: true })
                .then(function(res) {
                    console.log('📊 Supabase response:', res);

                    if (res.error) {
                        console.error('❌ 加载失败:', res.error);
                        loadFromLocalStorage();
                        return;
                    }

                    var items = res.data || [];
                    console.log('✅ 加载成功:', items.length, 'items');

                    if (items.length === 0) {
                        console.log('📭 No items found, checking localStorage...');
                        loadFromLocalStorage();
                        return;
                    }

                    renderCards(items);
                })
                .catch(function(err) {
                    console.error('❌ 加载异常:', err);
                    loadFromLocalStorage();
                });
        }

        function loadFromLocalStorage() {
            var container = document.getElementById('partnershipGrid');
            if (!container) return;

            var saved = localStorage.getItem('partnership_items');
            if (saved) {
                try {
                    var items = JSON.parse(saved);
                    console.log('💾 Loaded from localStorage:', items.length, 'items');
                    if (items.length > 0) {
                        renderCards(items);
                        return;
                    }
                } catch (e) {
                    console.warn('⚠️ Parse localStorage failed:', e);
                }
            }

            // 空状态
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-handshake"></i>
                    <div style="font-size:1.1rem; color:rgba(255,255,255,0.3);">No partnership programs available</div>
                    <div style="font-size:0.8rem; color:rgba(255,255,255,0.1); margin-top:4px;">Check back soon for exclusive offers</div>
                </div>
            `;
        }

        function renderCards(items) {
            var container = document.getElementById('partnershipGrid');
            if (!container) return;

            if (!items || items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-handshake"></i>
                        <div style="font-size:1.1rem; color:rgba(255,255,255,0.3);">No partnership programs available</div>
                        <div style="font-size:0.8rem; color:rgba(255,255,255,0.1); margin-top:4px;">Check back soon for exclusive offers</div>
                    </div>
                `;
                return;
            }

            var html = '';
            items.forEach(function(item) {
                // Logo 显示
                var logoHTML = '';
                if (item.logo_url && item.logo_url.startsWith('http')) {
                    logoHTML = `<img src="${item.logo_url}" alt="${item.title}" class="card-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`;
                } else {
                    logoHTML = `<div class="card-logo-placeholder"><i class="fas fa-handshake"></i></div>`;
                }

                html += `
                    <div class="partnership-card">
                        ${logoHTML}
                        <div class="card-title">${item.title || 'Partnership'}</div>
                        <div class="card-value">${item.welcome_bonus || 'RM 0'}</div>
                        <div class="card-value" style="font-size:1rem; background:linear-gradient(135deg,#4cd9a0,#2ecc71); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">${item.daily_rebate || '0%'}</div>
                        <div class="card-value" style="font-size:1rem; background:linear-gradient(135deg,#4a7cff,#8ca3ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">${item.weekly_bonus || 'RM 0'}</div>
                        <div class="card-desc">${item.description || ''}</div>
                        <div class="card-actions">
                            <a href="deposit.html" class="btn-claim"><i class="fas fa-gift"></i> Claim Now</a>
                            <a href="https://t.me/vision711" target="_blank" class="btn-telegram"><i class="fab fa-telegram-plane"></i> Join Telegram</a>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            console.log('✅ Rendered', items.length, 'cards');
        }

        // ===== Logo 流光 =====
        function initLogos() {
            ['sidebarLogoCanvas', 'headerLogoCanvas'].forEach(function(id) {
                var canvas = document.getElementById(id);
                if (canvas) initLogoCanvas(canvas);
            });
        }

        function initLogoCanvas(canvas) {
            var ctx = canvas.getContext('2d');
            var img = new Image();
            img.crossOrigin = 'anonymous';
            img.src = 'https://jkbpbjhrgbnzexvjvxgt.supabase.co/storage/v1/object/public/hero-background/logo.png';

            var logoData = null, w = 0, h = 0, startTime = performance.now();

            img.onload = function() {
                w = img.width; h = img.height;
                canvas.width = w; canvas.height = h;
                ctx.drawImage(img, 0, 0);
                logoData = ctx.getImageData(0, 0, w, h);
                ctx.clearRect(0, 0, w, h);
                requestAnimationFrame(drawFrame);
            };

            function drawFrame(timestamp) {
                if (!logoData) return;
                var elapsed = (timestamp - startTime) / 1000;
                var waitTime = 1.0, scanDuration = 1.2, totalTime = waitTime + scanDuration;
                var timeInCycle = elapsed % totalTime;
                var progress = timeInCycle < waitTime ? -1 : 1 - (timeInCycle - waitTime) / scanDuration;
                ctx.clearRect(0, 0, w, h);
                ctx.globalAlpha = 0.9;
                ctx.drawImage(img, 0, 0);
                ctx.globalAlpha = 1.0;
                var imageData = ctx.getImageData(0, 0, w, h);
                var data = imageData.data;
                var barWidth = Math.max(20, w * 0.25);
                var centerX = progress * (w + barWidth) - barWidth / 2;
                for (var y = 0; y < h; y++) {
                    for (var x = 0; x < w; x++) {
                        var idx = (y * w + x) * 4;
                        if (logoData.data[idx + 3] < 128) continue;
                        var dist = Math.abs(x - centerX);
                        if (dist > barWidth / 2) continue;
                        var strength = 1 - (dist / (barWidth / 2));
                        var alpha = strength * 0.55;
                        data[idx] = Math.min(255, data[idx] + 180 * alpha);
                        data[idx + 1] = Math.min(255, data[idx + 1] + 180 * alpha);
                        data[idx + 2] = Math.min(255, data[idx + 2] + 150 * alpha);
                    }
                }
                ctx.putImageData(imageData, 0, 0);
                requestAnimationFrame(drawFrame);
            }
        }

        // ===== 启动 =====
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Partnership page initializing...');
            loadPartnershipData();
            initLogos();

            var savedLang = localStorage.getItem('preferred_language') || 'en';
            document.querySelectorAll('.lang-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.lang === savedLang);
                btn.addEventListener('click', function() {
                    var lang = this.dataset.lang;
                    localStorage.setItem('preferred_language', lang);
                    document.querySelectorAll('.lang-btn').forEach(function(b) {
                        b.classList.toggle('active', b.dataset.lang === lang);
                    });
                    location.reload();
                });
            });

            var isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            var authButtons = document.querySelector('.header-auth-buttons');
            var slogan = document.querySelector('.mobile-header-slogan');
            if (authButtons && slogan) {
                if (isLoggedIn) {
                    authButtons.style.display = 'none';
                    slogan.style.display = 'inline-block';
                    slogan.textContent = 'Play Safe, Win Safe';
                } else {
                    authButtons.style.display = 'flex';
                    slogan.style.display = 'none';
                }
            }
        });

        console.log('✅ Partnership page loaded');
    })();
</script>
