<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Login · VISION711</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: #06060f;
        }
        .login-box {
            background: rgba(10, 10, 32, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 180, 255, 0.08);
            border-radius: 20px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo h1 {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #00b4ff, #00d4ff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-logo p {
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.8rem;
            margin-top: 4px;
            letter-spacing: 2px;
        }
        .input-group {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 0 18px;
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            transition: border-color 0.3s;
        }
        .input-group:focus-within {
            border-color: rgba(0, 180, 255, 0.3);
        }
        .input-group i {
            color: rgba(255, 215, 0, 0.5);
            width: 20px;
            flex-shrink: 0;
        }
        .input-group input {
            background: transparent;
            border: none;
            padding: 14px 10px;
            color: #fff;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            background: linear-gradient(145deg, #00b4ff, #0088d4);
            color: #fff;
            box-shadow: 0 4px 30px rgba(0, 180, 255, 0.25);
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 40px rgba(0, 180, 255, 0.35);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.7rem;
            text-decoration: none;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: rgba(0, 180, 255, 0.3);
        }
        .demo-hint {
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.15);
            margin-top: 12px;
        }
        .demo-hint i {
            color: rgba(255, 215, 0, 0.2);
        }
        .admin-badge {
            display: inline-block;
            background: rgba(0, 180, 255, 0.08);
            border: 1px solid rgba(0, 180, 255, 0.08);
            color: #00b4ff;
            padding: 4px 20px;
            border-radius: 30px;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <h1><i class="fas fa-shield-alt"></i> DOKTORJUDI</h1>
                <p>Admin Management System</p>
                <div style="margin-top:14px;">
                    <span class="admin-badge"><i class="fas fa-lock"></i> Secure Login</span>
                </div>
            </div>

            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="admin-username" placeholder="Username" value="admin">
            </div>

            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="password" id="admin-password" placeholder="Password" value="admin123">
            </div>

            <button class="login-btn" id="admin-login-btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>

            <div class="demo-hint">
                <i class="fas fa-info-circle"></i> Demo: admin / admin123
            </div>

            <a href="../index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>

    <script>
        document.getElementById('admin-login-btn').addEventListener('click', function() {
            const username = document.getElementById('admin-username').value;
            const password = document.getElementById('admin-password').value;
            
            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'vision711-admin-dashboard-mantap6729fvgd.html';
            } else {
                alert('❌ 用户名或密码错误！\n提示: admin / admin123');
            }
        });

        // Enter 鍵支持
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('admin-login-btn').click();
                }
            });
        });
    </script>
</body>
</html>
