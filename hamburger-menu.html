<!-- components/hamburger-menu.html -->
<!-- ===== Hamburger Menu 组件 (手机版) ===== -->
<style>
/* ===== Hamburger Menu 样式 ===== */
.hamburger-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
}

/* Hamburger 按钮 */
.hamburger-btn {
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 4px;
    z-index: 1001;
    position: relative;
    transition: 0.3s;
}

.hamburger-btn span {
    display: block;
    width: 24px;
    height: 2px;
    background: rgba(255, 255, 255, 0.6);
    border-radius: 2px;
    transition: 0.3s;
    transform-origin: center;
}

.hamburger-btn:hover span {
    background: rgba(255, 255, 255, 0.9);
}

/* Hamburger 激活状态 (X) */
.hamburger-btn.active span:nth-child(1) {
    transform: rotate(45deg) translate(4px, 4px);
    background: #00b4ff;
}

.hamburger-btn.active span:nth-child(2) {
    opacity: 0;
    transform: scaleX(0);
}

.hamburger-btn.active span:nth-child(3) {
    transform: rotate(-45deg) translate(4px, -4px);
    background: #00b4ff;
}

/* ===== 抽屉菜单 ===== */
.hamburger-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 999;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
}

.hamburger-overlay.open {
    opacity: 1;
    visibility: visible;
}

.hamburger-menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 280px;
    max-width: 80vw;
    height: 100%;
    background: 
        repeating-linear-gradient(90deg, transparent 0px, transparent 3px, rgba(255, 255, 255, 0.015) 3px, rgba(255, 255, 255, 0.015) 4px),
        linear-gradient(180deg, #0a0a20 0%, #0d0d2a 50%, #0a0a20 100%);
    border-right: 1px solid rgba(0, 180, 255, 0.08);
    padding: 20px 18px 30px;
    z-index: 1000;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow-y: auto;
    box-shadow: 4px 0 40px rgba(0, 0, 0, 0.5);
}

.hamburger-menu.open {
    transform: translateX(0);
}

/* 菜单头部 - Logo */
.hamburger-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    margin-bottom: 16px;
}

.hamburger-header .logo-metal {
    font-size: 1.3rem;
    letter-spacing: 2px;
}

.hamburger-close {
    background: transparent;
    border: none;
    color: rgba(255, 255, 255, 0.3);
    font-size: 1.4rem;
    cursor: pointer;
    padding: 4px 8px;
    transition: 0.3s;
}

.hamburger-close:hover {
    color: #fff;
    transform: rotate(90deg);
}

/* 用户信息 */
.hamburger-user {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 12px;
    background: rgba(0, 180, 255, 0.05);
    border-radius: 16px;
    border: 1px solid rgba(0, 180, 255, 0.06);
    margin-bottom: 16px;
}

.hamburger-user .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: 
        repeating-linear-gradient(90deg, transparent 0px, transparent 2px, rgba(255, 255, 255, 0.03) 2px, rgba(255, 255, 255, 0.03) 3px),
        linear-gradient(145deg, #0d0d30, #1a1a4a);
    border: 2px solid rgba(0, 180, 255, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    color: #00b4ff;
    flex-shrink: 0;
}

.hamburger-user .info {
    flex: 1;
}

.hamburger-user .info .name {
    font-size: 0.95rem;
    font-weight: 600;
    color: #fff;
}

.hamburger-user .info .role {
    font-size: 0.7rem;
    color: rgba(255, 255, 255, 0.3);
}

.hamburger-user .vip-badge {
    background: linear-gradient(145deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.05));
    border: 1px solid rgba(255, 215, 0, 0.2);
    color: #ffd700;
    font-weight: 700;
    font-size: 0.6rem;
    padding: 4px 12px;
    border-radius: 30px;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.05);
    white-space: nowrap;
}

/* 菜单导航链接 */
.hamburger-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 16px;
}

.hamburger-nav a {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    border-radius: 12px;
    color: rgba(255, 255, 255, 0.4);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.3s ease;
}

.hamburger-nav a i {
    width: 22px;
    text-align: center;
    font-size: 1.1rem;
    color: rgba(255, 255, 255, 0.2);
    transition: 0.3s;
}

.hamburger-nav a:hover {
    background: rgba(0, 180, 255, 0.05);
    color: rgba(255, 255, 255, 0.7);
}

.hamburger-nav a:hover i {
    color: rgba(0, 180, 255, 0.5);
}

.hamburger-nav a.active {
    background: 
        repeating-linear-gradient(90deg, transparent 0px, transparent 2px, rgba(255, 255, 255, 0.02) 2px, rgba(255, 255, 255, 0.02) 3px),
        linear-gradient(135deg, rgba(0, 180, 255, 0.08), rgba(255, 215, 0, 0.04));
    border: 1px solid rgba(0, 180, 255, 0.08);
    color: #fff;
}

.hamburger-nav a.active i {
    color: #00b4ff;
}

.hamburger-nav a.active::before {
    content: '';
    position: absolute;
    left: -1px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 20px;
    background: linear-gradient(180deg, #00b4ff, #ffd700);
    border-radius: 0 3px 3px 0;
    box-shadow: 0 0 20px rgba(0, 180, 255, 0.3);
}

.hamburger-nav a {
    position: relative;
}

/* 语言切换器 (菜单内) */
.hamburger-lang {
    display: flex;
    gap: 8px;
    padding: 12px 14px;
    border-top: 1px solid rgba(255, 255, 255, 0.04);
    margin-top: 4px;
}

.hamburger-lang .lang-btn {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.2);
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 0.6rem;
    cursor: pointer;
    transition: 0.3s;
    font-weight: 600;
}

.hamburger-lang .lang-btn.active {
    border-color: rgba(0, 180, 255, 0.2);
    color: rgba(255, 255, 255, 0.5);
    background: rgba(0, 180, 255, 0.05);
}

.hamburger-lang .lang-btn:hover {
    border-color: rgba(0, 180, 255, 0.3);
    color: rgba(255, 255, 255, 0.5);
}

/* 菜单底部 - Admin 入口 */
.hamburger-footer {
    padding-top: 12px;
    border-top: 1px solid rgba(255, 255, 255, 0.04);
    margin-top: auto;
}

.hamburger-footer a {
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(255, 255, 255, 0.12);
    text-decoration: none;
    font-size: 0.65rem;
    padding: 8px 14px;
    border-radius: 8px;
    transition: 0.3s;
}

.hamburger-footer a:hover {
    color: rgba(0, 180, 255, 0.3);
    background: rgba(0, 180, 255, 0.03);
}

/* ===== 手机顶部导航调整 ===== */
.mobile-header {
    display: flex !important;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
}

.mobile-header .logo-metal {
    font-size: 1.3rem !important;
    letter-spacing: 2px !important;
    flex-shrink: 0;
}

/* 手机版隐藏原有的右上角元素 */
.mobile-header .badge-vip,
.mobile-header .lang-switcher,
.mobile-header .user-avatar-metal {
    display: none !important;
}
</style>

<!-- HTML 结构 -->
<div class="hamburger-wrapper">
    <!-- Hamburger 按钮 -->
    <button class="hamburger-btn" id="hamburgerToggle" aria-label="Toggle Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>
</div>

<!-- 遮罩层 -->
<div class="hamburger-overlay" id="hamburgerOverlay"></div>

<!-- 抽屉菜单 -->
<div class="hamburger-menu" id="hamburgerMenu">
    <!-- 菜单头部 -->
    <div class="hamburger-header">
        <a href="index.html" class="logo-metal">
            <span class="vision">VISION</span><span class="seven">7</span><span class="one">1</span><span class="seven">1</span>
        </a>
        <button class="hamburger-close" id="hamburgerClose"><i class="fas fa-times"></i></button>
    </div>

    <!-- 用户信息 -->
    <div class="hamburger-user">
        <div class="avatar"><i class="fas fa-user"></i></div>
        <div class="info">
            <div class="name" data-i18n="home.player">Player</div>
            <div class="role">ID: #PL-2026-001</div>
        </div>
        <span class="vip-badge"><i class="fas fa-gem"></i> VIP 2</span>
    </div>

    <!-- 导航链接 -->
    <nav class="hamburger-nav">
        <a href="index.html" class="nav-item" data-page="index">
            <i class="fas fa-home"></i> <span data-i18n="nav.home">Home</span>
        </a>
        <a href="dashboard.html" class="nav-item" data-page="dashboard">
            <i class="fas fa-tachometer-alt"></i> <span data-i18n="nav.dashboard">Dashboard</span>
        </a>
        <a href="deposit.html" class="nav-item" data-page="deposit">
            <i class="fas fa-wallet"></i> <span data-i18n="nav.deposit">Deposit</span>
        </a>
        <a href="withdraw.html" class="nav-item" data-page="withdraw">
            <i class="fas fa-arrow-up"></i> <span data-i18n="nav.withdraw">Withdraw</span>
        </a>
        <a href="profile.html" class="nav-item" data-page="profile">
            <i class="fas fa-user-cog"></i> <span data-i18n="nav.profile">Profile</span>
        </a>
    </nav>

    <!-- 语言切换 -->
    <div class="hamburger-lang">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="zh">中文</button>
    </div>

    <!-- 底部 -->
    <div class="hamburger-footer">
        <a href="../admin/login.html">
            <i class="fas fa-shield-alt"></i> <span data-i18n="home.adminLogin">Admin Login</span>
        </a>
    </div>
</div>

<script>
// ===== Hamburger Menu 初始化 =====
(function initHamburger() {
    const toggleBtn = document.getElementById('hamburgerToggle');
    const closeBtn = document.getElementById('hamburgerClose');
    const menu = document.getElementById('hamburgerMenu');
    const overlay = document.getElementById('hamburgerOverlay');
    
    if (!toggleBtn || !menu || !overlay) return;

    function openMenu() {
        menu.classList.add('open');
        overlay.classList.add('open');
        toggleBtn.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeMenu() {
        menu.classList.remove('open');
        overlay.classList.remove('open');
        toggleBtn.classList.remove('active');
        document.body.style.overflow = '';
    }

    function toggleMenu() {
        if (menu.classList.contains('open')) {
            closeMenu();
        } else {
            openMenu();
        }
    }

    // 点击汉堡按钮
    toggleBtn.addEventListener('click', toggleMenu);

    // 点击关闭按钮
    if (closeBtn) {
        closeBtn.addEventListener('click', closeMenu);
    }

    // 点击遮罩关闭
    overlay.addEventListener('click', closeMenu);

    // 按 ESC 关闭
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && menu.classList.contains('open')) {
            closeMenu();
        }
    });

    // 点击菜单内链接自动关闭 (延迟以等待页面跳转)
    document.querySelectorAll('.hamburger-nav a').forEach(link => {
        link.addEventListener('click', function() {
            // 高亮当前页面
            document.querySelectorAll('.hamburger-nav a').forEach(l => l.classList.remove('active'));
            this.classList.add('active');
            // 延迟关闭，让点击事件先完成
            setTimeout(closeMenu, 200);
        });
    });

    // 高亮当前页面
    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.hamburger-nav a').forEach(link => {
        const href = link.getAttribute('href');
        if (href && currentPage.includes(href.replace('./', ''))) {
            link.classList.add('active');
        }
    });

    // 暴露方法
    window.hamburger = { open: openMenu, close: closeMenu, toggle: toggleMenu };
})();
</script>
