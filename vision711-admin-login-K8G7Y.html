<!DOCTYPE html>
<html>
<head>
    <title>Admin Login · VISION711</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f2a 0%, #0f0a2a 100%);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('https://jkbpbjhrgbnzexvjvxgt.supabase.co/storage/v1/object/public/hero-background/desktop-hero-background.png');
            background-size: cover;
            background-position: center;
        }
        .login-container {
            background: rgba(20, 30, 55, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 40px;
            width: 420px;
            border: 1px solid rgba(140, 163, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            text-align: center;
            margin-bottom: 8px;
        }
        .logo span { 
            background: linear-gradient(135deg, #00b4ff, #ffd700);

            -webkit-text-fill-color: transparent;
        }
        .logo small { 
            font-size: 11px; 
            color: #5a6388; 
            display: block; 
            margin-top: 2px; 
            -webkit-text-fill-color: #5a6388; 
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a8c0;
            font-size: 13px;
        }
        .form-group label i { margin-right: 6px; color: #4a7cff; }
        .form-group input {
            width: 100%;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid #2a3560;
            border-radius: 14px;
            padding: 14px 16px;
            color: white;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }
        .form-group input:focus { border-color: #4a7cff; box-shadow: 0 0 20px rgba(74,124,255,0.08); }
        .form-group input::placeholder { color: #4a5a7a; }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #4a7cff, #2f3e7a);
            border: none;
            padding: 16px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(74,124,255,0.3); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .error-message {
            text-align: center;
            margin-top: 16px;
            color: #ff6b6b;
            font-size: 13px;
            min-height: 24px;
        }
        .success-message {
            text-align: center;
            margin-top: 16px;
            color: #4ade80;
            font-size: 13px;
            min-height: 24px;
        }
        .ga-hint {
            font-size: 11px;
            color: #4a5a7a;
            text-align: center;
            margin-top: 6px;
        }
        .ga-hint i { color: #4a7cff; }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0 16px;
            color: #3a4a6a;
            font-size: 11px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .divider::before { margin-right: 16px; }
        .divider::after { margin-left: 16px; }
        .back-link {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #5a6388;
        }
        .back-link a { color: #4a7cff; text-decoration: none; transition: 0.3s; }
        .back-link a:hover { color: #8ca3ff; text-decoration: underline; }
        @media (max-width: 480px) {
            .login-container { padding: 32px 24px; }
            .logo { font-size: 24px; }
            .form-group input { padding: 12px 14px; font-size: 13px; }
            .login-btn { padding: 14px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            VISION<span>711</span>
            <small>ADMIN MANAGEMENT SYSTEM</small>
        </div>

        <div class="form-group">
            <label><i class="fas fa-user"></i> Admin Username</label>
            <input type="text" id="adminUsername" placeholder="Enter admin username" value="Vision711Admin">
        </div>

        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="adminPassword" placeholder="Enter password" value="Vision711@6511" autocomplete="current-password">
        </div>

        <div class="form-group">
            <label><i class="fas fa-shield-alt"></i> Google Authenticator Code</label>
            <input type="text" id="gaCode" placeholder="6-digit code" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
            <div class="ga-hint">
                <i class="fas fa-mobile-alt"></i> 
                Open Google Authenticator / Authy app
            </div>
        </div>

        <button class="login-btn" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>

        <div id="messageBox" class="error-message"></div>

        <div class="divider">SECURE ACCESS</div>

        <div class="back-link">
            <a href="/"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script>
        (function() {
            var usernameInput = document.getElementById('adminUsername');
            var passwordInput = document.getElementById('adminPassword');
            var gaInput = document.getElementById('gaCode');
            var messageBox = document.getElementById('messageBox');
            var loginBtn = document.getElementById('loginBtn');

            var SUPABASE_URL = 'https://jkbpbjhrgbnzexvjvxgt.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprYnBiamhyZ2JuemV4dmp2eGd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NzA3MjEsImV4cCI6MjA5OTM0NjcyMX0.YJYx0X1uddWSQfD4w9AzPBHUnLKI0_k0QNeN_PH5JgM';

            function base32Decode(encoded) {
                var alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
                var bytes = [];
                var bits = 0;
                var value = 0;
                for (var i = 0; i < encoded.length; i++) {
                    var index = alphabet.indexOf(encoded[i].toUpperCase());
                    if (index === -1) continue;
                    value = (value << 5) | index;
                    bits += 5;
                    if (bits >= 8) {
                        bytes.push((value >> (bits - 8)) & 0xff);
                        bits -= 8;
                    }
                }
                return new Uint8Array(bytes);
            }

            function generateTOTP(secret, offsetSeconds) {
                offsetSeconds = offsetSeconds || 0;
                try {
                    var key = base32Decode(secret);
                    var epoch = Math.floor((Date.now() / 1000 + offsetSeconds) / 30);
                    var timeBytes = new Uint8Array(8);
                    var e = epoch;
                    for (var i = 7; i >= 0; i--) {
                        timeBytes[i] = e & 0xff;
                        e >>= 8;
                    }
                    var hmac = CryptoJS.HmacSHA1(
                        CryptoJS.lib.WordArray.create(timeBytes),
                        CryptoJS.lib.WordArray.create(key)
                    );
                    var hmacBytes = new Uint8Array(hmac.words.length * 4);
                    for (var j = 0; j < hmac.words.length; j++) {
                        hmacBytes[j * 4] = (hmac.words[j] >> 24) & 0xff;
                        hmacBytes[j * 4 + 1] = (hmac.words[j] >> 16) & 0xff;
                        hmacBytes[j * 4 + 2] = (hmac.words[j] >> 8) & 0xff;
                        hmacBytes[j * 4 + 3] = hmac.words[j] & 0xff;
                    }
                    var offsetByte = hmacBytes[19] & 0xf;
                    var binary = ((hmacBytes[offsetByte] & 0x7f) << 24) |
                                  ((hmacBytes[offsetByte + 1] & 0xff) << 16) |
                                  ((hmacBytes[offsetByte + 2] & 0xff) << 8) |
                                  (hmacBytes[offsetByte + 3] & 0xff);
                    var otp = binary % 1000000;
                    return String(otp).padStart(6, '0');
                } catch (e) {
                    console.error('生成 TOTP 失败:', e);
                    return null;
                }
            }

            function verifyGA(secret, code) {
                try {
                    var offsets = [-30, 0, 30];
                    for (var i = 0; i < offsets.length; i++) {
                        var generated = generateTOTP(secret, offsets[i]);
                        if (generated === code) {
                            return true;
                        }
                    }
                    return false;
                } catch (e) {
                    return false;
                }
            }

            function handleLogin() {
                var username = usernameInput.value.trim();
                var password = passwordInput.value;
                var gaCode = gaInput.value.trim();

                messageBox.textContent = '';
                messageBox.className = '';

                if (!username) {
                    messageBox.textContent = '⚠️ Please enter admin username';
                    messageBox.className = 'error-message';
                    return;
                }
                if (!password) {
                    messageBox.textContent = '⚠️ Please enter password';
                    messageBox.className = 'error-message';
                    return;
                }
                if (!gaCode || gaCode.length !== 6 || !/^\d{6}$/.test(gaCode)) {
                    messageBox.textContent = '⚠️ Please enter a valid 6-digit code';
                    messageBox.className = 'error-message';
                    return;
                }

                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';

                // 🔥 直接用 id=1 查询，绕过所有用户名问题
                sb.from('admin_users')
                    .select('*')
                    .eq('id', 1)
                    .then(function(res) {
                        var data = res.data;
                        var error = res.error;

                        if (error) {
                            messageBox.textContent = '❌ Database error: ' + error.message;
                            messageBox.className = 'error-message';
                            loginBtn.disabled = false;
                            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                            return;
                        }

                        if (!data || data.length === 0) {
                            messageBox.textContent = '❌ Admin user not found (id=1)';
                            messageBox.className = 'error-message';
                            loginBtn.disabled = false;
                            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                            return;
                        }

                        var admin = data[0];

                        if (admin.password_hash !== password) {
                            messageBox.textContent = '❌ Invalid password';
                            messageBox.className = 'error-message';
                            loginBtn.disabled = false;
                            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                            return;
                        }

                        if (!verifyGA(admin.ga_secret, gaCode)) {
                            var expected = generateTOTP(admin.ga_secret, 0);
                            messageBox.textContent = '❌ Invalid GA code. Expected: ' + expected;
                            messageBox.className = 'error-message';
                            loginBtn.disabled = false;
                            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                            return;
                        }

                        messageBox.textContent = '✅ Login successful! Redirecting...';
                        messageBox.className = 'success-message';

                        localStorage.setItem('admin_logged_in', 'true');
                        localStorage.setItem('admin_username', username);
                        localStorage.setItem('admin_login_time', Date.now().toString());

                        setTimeout(function() {
                            window.location.href = 'vision711-admin-dashboard-GB75L.html';
                        }, 800);
                    })
                    .catch(function(err) {
                        console.error('❌ 查询失败:', err);
                        messageBox.textContent = '❌ Error: ' + err.message;
                        messageBox.className = 'error-message';
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                    });
            }

            loginBtn.addEventListener('click', handleLogin);

            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleLogin();
                }
            });

            if (localStorage.getItem('admin_logged_in') === 'true') {
                var loginTime = parseInt(localStorage.getItem('admin_login_time') || '0');
                if (Date.now() - loginTime < 24 * 60 * 60 * 1000) {
                    window.location.href = 'vision711-admin-dashboard-GB75L.html';
                } else {
                    localStorage.removeItem('admin_logged_in');
                }
            }
        })();
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</body>
</html>
