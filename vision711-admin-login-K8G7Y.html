<!DOCTYPE html>
<html>
<head>
    <title>Admin Login · VISION711</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f2a 0%, #0f0a2a 100%);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('https://jkbpbjhrgbnzexvjvxgt.supabase.co/storage/v1/object/public/hero-background/desktop-hero-background.png');
            background-size: cover;
            background-position: center;
        }
        .login-container {
            background: rgba(20, 30, 55, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 40px;
            width: 420px;
            border: 1px solid rgba(140, 163, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            text-align: center;
            margin-bottom: 8px;
        }
        .logo span { 
            background: linear-gradient(135deg, #00b4ff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo small { font-size: 11px; color: #5a6388; display: block; margin-top: 2px; -webkit-text-fill-color: #5a6388; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a8c0;
            font-size: 13px;
        }
        .form-group label i { margin-right: 6px; color: #4a7cff; }
        .form-group input {
            width: 100%;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid #2a3560;
            border-radius: 14px;
            padding: 14px 16px;
            color: white;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }
        .form-group input:focus { border-color: #4a7cff; box-shadow: 0 0 20px rgba(74,124,255,0.08); }
        .form-group input::placeholder { color: #4a5a7a; }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #4a7cff, #2f3e7a);
            border: none;
            padding: 16px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(74,124,255,0.3); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .error-message {
            text-align: center;
            margin-top: 16px;
            color: #ff6b6b;
            font-size: 13px;
            min-height: 24px;
        }
        .success-message {
            text-align: center;
            margin-top: 16px;
            color: #4ade80;
            font-size: 13px;
            min-height: 24px;
        }
        .ga-hint {
            font-size: 11px;
            color: #4a5a7a;
            text-align: center;
            margin-top: 6px;
        }
        .ga-hint i { color: #4a7cff; }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0 16px;
            color: #3a4a6a;
            font-size: 11px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .divider::before { margin-right: 16px; }
        .divider::after { margin-left: 16px; }
        .back-link {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #5a6388;
        }
        .back-link a { color: #4a7cff; text-decoration: none; transition: 0.3s; }
        .back-link a:hover { color: #8ca3ff; text-decoration: underline; }

        @media (max-width: 480px) {
            .login-container { padding: 32px 24px; }
            .logo { font-size: 24px; }
            .form-group input { padding: 12px 14px; font-size: 13px; }
            .login-btn { padding: 14px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            VISION<span>711</span>
            <small>ADMIN MANAGEMENT SYSTEM</small>
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-user"></i> Admin Username</label>
            <input type="text" id="adminUsername" placeholder="Enter admin username" value="admin">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="adminPassword" placeholder="Enter password" autocomplete="current-password">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-shield-alt"></i> Google Authenticator Code</label>
            <input type="text" id="gaCode" placeholder="6-digit code" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
            <div class="ga-hint">
                <i class="fas fa-mobile-alt"></i> 
                Open Google Authenticator / Authy app
            </div>
        </div>
        
        <button class="login-btn" id="loginBtn" onclick="handleLogin()">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
        
        <div id="messageBox" class="error-message"></div>
        
        <div class="divider">SECURE ACCESS</div>
        
        <div class="back-link">
            <a href="/"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script>
        // ============================================================
        // Supabase 配置
        // ============================================================
        const SUPABASE_URL = 'https://qgmbzdfnwsdosdqphlxk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_zsJFjfNUO7NKp8ZH5KrXFQ_WZ8Q2Kym';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================================
        // Base32 解码
        // ============================================================
        function base32Decode(encoded) {
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            const bytes = [];
            let bits = 0;
            let value = 0;
            for (const char of encoded.toUpperCase()) {
                const index = alphabet.indexOf(char);
                if (index === -1) continue;
                value = (value << 5) | index;
                bits += 5;
                if (bits >= 8) {
                    bytes.push((value >> (bits - 8)) & 0xff);
                    bits -= 8;
                }
            }
            return new Uint8Array(bytes);
        }

        // ============================================================
        // 生成 TOTP（支持时间偏移，单位：秒）
        // ============================================================
        function generateTOTP(secret, offsetSeconds = 0) {
            try {
                const key = base32Decode(secret);
                const epoch = Math.floor((Date.now() / 1000 + offsetSeconds) / 30);
                const timeBytes = new Uint8Array(8);
                let e = epoch;
                for (let i = 7; i >= 0; i--) {
                    timeBytes[i] = e & 0xff;
                    e >>= 8;
                }
                
                const hmac = CryptoJS.HmacSHA1(
                    CryptoJS.lib.WordArray.create(timeBytes),
                    CryptoJS.lib.WordArray.create(key)
                );
                
                const hmacBytes = new Uint8Array(hmac.words.length * 4);
                for (let i = 0; i < hmac.words.length; i++) {
                    hmacBytes[i * 4] = (hmac.words[i] >> 24) & 0xff;
                    hmacBytes[i * 4 + 1] = (hmac.words[i] >> 16) & 0xff;
                    hmacBytes[i * 4 + 2] = (hmac.words[i] >> 8) & 0xff;
                    hmacBytes[i * 4 + 3] = hmac.words[i] & 0xff;
                }
                
                const offsetByte = hmacBytes[19] & 0xf;
                const binary = ((hmacBytes[offsetByte] & 0x7f) << 24) |
                              ((hmacBytes[offsetByte + 1] & 0xff) << 16) |
                              ((hmacBytes[offsetByte + 2] & 0xff) << 8) |
                              (hmacBytes[offsetByte + 3] & 0xff);
                const otp = binary % 1000000;
                return String(otp).padStart(6, '0');
            } catch (e) {
                console.error('生成 TOTP 失败:', e);
                return null;
            }
        }

        // ============================================================
        // GA 验证 - 检查前一个、当前、下一个（3 个时间窗口）
        // ============================================================
        function verifyGA(secret, code) {
            try {
                const offsets = [-30, 0, 30];
                
                for (const offset of offsets) {
                    const generated = generateTOTP(secret, offset);
                    console.log(`偏移 ${offset}秒:`, generated);
                    if (generated === code) {
                        console.log('✅ 匹配成功！偏移量:', offset);
                        return true;
                    }
                }
                
                console.log('❌ 所有偏移量都不匹配');
                return false;
            } catch (e) {
                console.error('GA 验证失败:', e);
                return false;
            }
        }

        // ============================================================
        // 登录处理
        // ============================================================
        async function handleLogin() {
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value;
            const gaCode = document.getElementById('gaCode').value.trim();
            const messageBox = document.getElementById('messageBox');
            const loginBtn = document.getElementById('loginBtn');

            messageBox.textContent = '';
            messageBox.className = '';

            if (!username) {
                messageBox.textContent = '⚠️ Please enter admin username';
                messageBox.className = 'error-message';
                return;
            }
            if (!password) {
                messageBox.textContent = '⚠️ Please enter password';
                messageBox.className = 'error-message';
                return;
            }
            if (!gaCode || gaCode.length !== 6 || !/^\d{6}$/.test(gaCode)) {
                messageBox.textContent = '⚠️ Please enter a valid 6-digit code';
                messageBox.className = 'error-message';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';

            try {
                // 从 Supabase 查询管理员
                const { data: admin, error } = await sb
                    .from('admin_users')
                    .select('*')
                    .eq('username', username)
                    .eq('is_active', true)
                    .single();

                if (error || !admin) {
                    messageBox.textContent = '❌ Admin user not found';
                    messageBox.className = 'error-message';
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                    return;
                }

                if (admin.password_hash !== password) {
                    messageBox.textContent = '❌ Invalid password';
                    messageBox.className = 'error-message';
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                    return;
                }

                const isValidGA = verifyGA(admin.ga_secret, gaCode);
                if (!isValidGA) {
                    messageBox.textContent = '❌ Invalid Google Authenticator code';
                    messageBox.className = 'error-message';
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                    return;
                }

                messageBox.textContent = '✅ Login successful! Redirecting...';
                messageBox.className = 'success-message';

                localStorage.setItem('admin_logged_in', 'true');
                localStorage.setItem('admin_username', username);
                localStorage.setItem('admin_login_time', Date.now().toString());

                setTimeout(() => {
                    window.location.href = 'vision711-admin-dashboard-GB75L.html';
                }, 800);

            } catch (err) {
                console.error('Login error:', err);
                messageBox.textContent = '❌ Login error: ' + err.message;
                messageBox.className = 'error-message';
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        }

        // Enter 键提交
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });

        // 检查是否已登录
        if (localStorage.getItem('admin_logged_in') === 'true') {
            const loginTime = parseInt(localStorage.getItem('admin_login_time') || '0');
            if (Date.now() - loginTime < 24 * 60 * 60 * 1000) {
                window.location.href = 'vision711-admin-dashboard-GB75L.html';
            } else {
                localStorage.removeItem('admin_logged_in');
            }
        }

        console.log('🔐 GA 验证 - 检查 -30s, 0s, +30s 三个时间窗口');
        console.log('📡 连接 Supabase:', SUPABASE_URL);
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</body>
</html>
